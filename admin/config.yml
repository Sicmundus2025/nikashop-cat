backend:
  name: github
  repo: Sicmundus2025/nikashop-cat
  branch: staging

# Las imágenes que subas desde el panel se guardan acá, dentro del repo
media_folder: "images"
public_folder: "/images"

publish_mode: simple
slug:
  encoding: "ascii"
  clean_accents: true

collections:
  # ===== Configuración general (logo del sitio) =====
  - name: "configuracion"
    label: "Configuración General"
    files:
      - name: "config-sitio"
        label: "Logo del sitio"
        file: "data/config-sitio.json"
        fields:
          - { label: "Logo de NIKASHOP", name: "logo", widget: "image", required: false, hint: "Si subís una imagen, reemplaza el ícono de la bolsa en el header y el footer" }

  # ===== Imágenes de subcategorías =====
  - name: "subcategorias-imagenes"
    label: "Imágenes de Subcategorías"
    files:
      - name: "subcategorias"
        label: "Imágenes de Subcategorías"
        file: "data/subcategorias-imagenes.json"
        fields:
          - label: "Subcategorías"
            name: "items"
            widget: "list"
            summary: "{{fields.categoria}} → {{fields.subcategoria}}"
            fields:
              - label: "Categoría"
                name: "categoria"
                widget: "select"
                options:
                  - "PlayStation"
                  - "Honor of Kings"
                  - "Genshin Impact"
                  - "Free Fire"
                  - "Mobile Legends"
                  - "Brawl Stars"
                  - "Streaming"
                  - "Música y Video"
                  - "Herramientas"
                  - "Roblox"
                  - "Gift Cards"
                  - "Arena Breakout"
                  - "Wuthering Waves"
                  - "Marvel Rivals"
                  - "Blood Strike"
                  - "Delta Force"
              - { label: "Subcategoría (debe coincidir exacto)", name: "subcategoria", widget: "string" }
              - { label: "Imagen", name: "imagen", widget: "image", required: false }

  # ===== Imágenes de las categorías principales =====
  - name: "categorias-imagenes"
    label: "Imágenes de Categorías"
    files:
      - name: "categorias"
        label: "Imágenes de Categorías"
        file: "data/categorias.json"
        fields:
          - label: "Categorías"
            name: "items"
            widget: "list"
            summary: "{{fields.categoria}}"
            fields:
              - label: "Categoría"
                name: "categoria"
                widget: "select"
                options:
                  - "PlayStation"
                  - "Honor of Kings"
                  - "Genshin Impact"
                  - "Free Fire"
                  - "Mobile Legends"
                  - "Brawl Stars"
                  - "Streaming"
                  - "Música y Video"
                  - "Herramientas"
                  - "Roblox"
                  - "Gift Cards"
                  - "Arena Breakout"
                  - "Wuthering Waves"
                  - "Marvel Rivals"
                  - "Blood Strike"
                  - "Delta Force"
              - { label: "Imagen", name: "imagen", widget: "image", required: false, hint: "Foto representativa de la categoría" }

  # ===== PlayStation (4 archivos según subcategoría) =====
  - name: "ps4"
    label: "PlayStation → Juegos PS4"
    files:
      - name: "ps4"
        label: "PlayStation → Juegos PS4"
        file: "data/playstation-ps4.json"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            summary: "{{fields.producto}} — ${{fields.precio}}"
            fields: &producto_fields
              - { label: "Producto", name: "producto", widget: "string" }
              - { label: "Precio", name: "precio", widget: "string" }
              - { label: "Precio Oferta (vacío si no hay oferta)", name: "precio_oferta", widget: "string", required: false }
              - { label: "Imagen", name: "imagen", widget: "image", required: false, hint: "Subí la foto del producto" }
              - { label: "Descripción (opcional)", name: "descripcion", widget: "text", required: false }

  - name: "ps5"
    label: "PlayStation → Juegos PS5"
    files:
      - name: "ps5"
        label: "PlayStation → Juegos PS5"
        file: "data/playstation-ps5.json"
        fields:
          - label: "Productos"
            name: "items"
            widget: "list"
            summary: "{{fields.producto}} — ${{fields.precio}}"
            fields: *producto_fields

  - name: "ps-ofertas"
    label: "PlayStation → Ofertas Especiales"
    files:
      - name: "ps-ofertas"
        label: "PlayStation → Ofertas Especiales"
        file: "data/playstation-ofertas.json"
        fields:
          - label: "Productos"
