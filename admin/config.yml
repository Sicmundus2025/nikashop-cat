    fields:
      - label: "Productos"
        name: "items"
        widget: "list"
        summary: "{{fields.producto}} — ${{fields.precio}}"
        fields: *producto_fields

  - name: "musica-y-video"
    label: "Música y Video"
    file: "data/musica-y-video.json"
    extension: "json"
    format: "json"
    fields:
      - label: "Productos"
        name: "items"
